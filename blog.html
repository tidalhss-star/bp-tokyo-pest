/* ===== Brutalist Avantgarde + kr-neon-void 테마 ===== */
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a1a1a;
  --text-primary: #f0f0f0;
  --text-secondary: #a0a0a0;
  --accent-neon: #39ff14;
  --accent-pink: #ff2d95;
  --accent-blue: #00d4ff;
  --border-thick: 4px solid var(--accent-neon);
  --font-mono: 'Courier New', Courier, monospace;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --shadow-neon: 0 0 20px rgba(57, 255, 20, 0.3);
  --grid-gap: 2rem;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== 헤더 & 네비게이션 ===== */
header {
  background: var(--bg-secondary);
  border-bottom: var(--border-thick);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: var(--shadow-neon);
}

.header-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: bold;
  color: var(--accent-neon);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-shadow: 0 0 15px var(--accent-neon);
}

.logo a {
  color: inherit;
  text-decoration: none;
}

/* ===== 햄버거 메뉴 ===== */
.hamburger-menu {
  display: none;
  flex-direction: column;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0.5rem;
}

.hamburger-menu span {
  display: block;
  width: 30px;
  height: 3px;
  background: var(--accent-neon);
  margin: 4px 0;
  transition: 0.3s;
  box-shadow: 0 0 8px var(--accent-neon);
}

@media (max-width: 768px) {
  .hamburger-menu {
    display: flex;
  }
  nav ul {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: var(--bg-secondary);
    border-bottom: var(--border-thick);
    padding: 1rem 0;
    box-shadow: var(--shadow-neon);
  }
  nav ul.active {
    display: flex;
  }
  nav ul li {
    margin: 0.5rem 0;
    text-align: center;
  }
}

/* ===== 네비게이션 링크 ===== */
nav ul {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav ul li {
  margin-left: 1.5rem;
}

nav ul li a {
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 1rem;
  padding: 0.5rem 0.75rem;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  letter-spacing: 0.05em;
}

nav ul li a:hover,
nav ul li a.active {
  border-color: var(--accent-neon);
  color: var(--accent-neon);
  text-shadow: 0 0 10px var(--accent-neon);
  background: rgba(57, 255, 20, 0.1);
}

/* ===== 메인 컨텐츠 ===== */
main {
  flex: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
  width: 100%;
}

/* ===== 히어로 섹션 (블로그 전용) ===== */
.hero-blog {
  background: var(--bg-secondary);
  border: var(--border-thick);
  padding: 3rem 2rem;
  margin-bottom: 3rem;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-neon);
}

.hero-blog::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(57, 255, 20, 0.03) 20px,
    rgba(57, 255, 20, 0.03) 40px
  );
  z-index: 0;
}

.hero-blog h1 {
  font-family: var(--font-mono);
  font-size: 2.8rem;
  color: var(--accent-neon);
  text-transform: uppercase;
  margin-bottom: 1rem;
  position: relative;
  z-index: 1;
  text-shadow: 0 0 20px var(--accent-neon);
  letter-spacing: 0.1em;
}

.hero-blog p {
  font-size: 1.2rem;
  color: var(--text-secondary);
  max-width: 700px;
  position: relative;
  z-index: 1;
}

/* ===== 블로그 글 카드 ===== */
.blog-post {
  background: var(--bg-secondary);
  border: 3px solid var(--accent-pink);
  padding: 2.5rem;
  margin-bottom: 2rem;
  box-shadow: 0 0 30px rgba(255, 45, 149, 0.1);
  transition: all 0.3s ease;
}

.blog-post:hover {
  box-shadow: 0 0 40px rgba(255, 45, 149, 0.3);
  transform: translateY(-4px);
}

.blog-post .post-meta {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--accent-pink);
  margin-bottom: 0.5rem;
  display: flex;
  gap: 1rem;
  text-transform: uppercase;
}

.blog-post h2 {
  font-family: var(--font-mono);
  font-size: 2rem;
  color: var(--text-primary);
  margin-bottom: 1rem;
  letter-spacing: 0.05em;
  line-height: 1.3;
}

.blog-post h2 a {
  color: inherit;
  text-decoration: none;
}

.blog-post h2 a:hover {
  color: var(--accent-neon);
  text-shadow: 0 0 10px var(--accent-neon);
}

.blog-post .post-content {
  font-size: 1.1rem;
  color: var(--text-secondary);
  line-height: 1.8;
}

.blog-post .post-content p {
  margin-bottom: 1.2rem;
}

.blog-post .post-content strong {
  color: var(--accent-neon);
}

.blog-post .post-content .highlight-box {
  background: rgba(57, 255, 20, 0.08);
  border-left: 4px solid var(--accent-neon);
  padding: 1rem 1.5rem;
  margin: 1.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.95rem;
}

.blog-post .post-content .tip-box {
  background: rgba(0, 212, 255, 0.08);
  border-left: 4px solid var(--accent-blue);
  padding: 1rem 1.5rem;
  margin: 1.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.95rem;
  color: var(--accent-blue);
}

.blog-post .read-more {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 0.75rem 2rem;
  background: transparent;
  border: 3px solid var(--accent-neon);
  color: var(--accent-neon);
  font-family: var(--font-mono);
  font-size: 1rem;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
  box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
}

.blog-post .read-more:hover {
  background: var(--accent-neon);
  color: var(--bg-primary);
  box-shadow: 0 0 30px var(--accent-neon);
}

.blog-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 2rem;
}

@media (max-width: 768px) {
  .blog-layout {
    grid-template-columns: 1fr;
  }
}

.sidebar {
  background: var(--bg-secondary);
  border: 3px solid var(--accent-blue);
  padding: 2rem;
  height: fit-content;
  position: sticky;
  top: 100px;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
}

.sidebar h3 {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  color: var(--accent-blue);
  margin-bottom: 1.5rem;
  border-bottom: 2px solid var(--accent-blue);
  padding-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.sidebar ul {
  list-style: none;
}

.sidebar ul li {
  margin-bottom: 1rem;
}

.sidebar ul li a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 1rem;
  transition: all 0.3s ease;
  display: block;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar ul li a:hover {
  color: var(--accent-neon);
  padding-left: 10px;
}

.sidebar .cta-button {
  display: block;
  margin-top: 2rem;
  text-align: center;
  padding: 1rem;
  background: var(--accent-pink);
  color: var(--bg-primary);
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: bold;
  text-transform: uppercase;
  text-decoration: none;
  border: none;
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
  box-shadow: 0 0 20px rgba(255, 45, 149, 0.4);
}

.sidebar .cta-button:hover {
  background: var(--accent-neon);
  color: var(--bg-primary);
  box-shadow: 0 0 40px var(--accent-neon);
}

/* ===== 푸터 ===== */
footer {
  background: var(--bg-secondary);
  border-top: var(--border-thick);
  padding: 2rem;
  margin-top: 3rem;
  box-shadow: var(--shadow-neon);
}

.footer-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.footer-container p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-family: var(--font-mono);
}

.footer-container nav a {
  color: var(--text-secondary);
  text-decoration: none;
  margin-left: 1rem;
  transition: color 0.3s ease;
  font-family: var(--font-mono);
  font-size: 0.9rem;
}

.footer-container nav a:hover {
  color: var(--accent-neon);
}

/* ===== 반응형 (768px 기준) ===== */
@media (max-width: 768px) {
  .hero-blog h1 {
    font-size: 2rem;
  }
  .blog-post {
    padding: 1.5rem;
  }
  .blog-post h2 {
    font-size: 1.5rem;
  }
  .blog-layout {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: static;
  }
  .header-container {
    flex-wrap: wrap;
  }
  nav ul {
    display: none;
    width: 100%;
    margin-top: 1rem;
  }
  nav ul.active {
    display: flex;
  }
  nav ul li {
    margin: 0.3rem 0;
  }
}
